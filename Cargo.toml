[package]
name = "lily-view"
version = "0.1.0"
edition = "2024"

[dependencies]
cpal = "0.16.0"
iced = { version = "0.14", features = ["canvas", "tokio", "svg"] }
midi-player = "0.2.3"
notify = "8.2.0"
rfd = "0.15"
tempfile = "3.25.0"
thiserror = "2.0.18"

[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"
rust_2018_idioms = { level = "warn", priority = -1 }

[lints.rustdoc]
broken_intra_doc_links = "deny"
bare_urls = "warn"

[lints.clippy]
dbg_macro = "warn"
todo = "warn"
unwrap_used = "warn"
undocumented_unsafe_blocks = "deny"
