name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Rust nightly tools
        run: rustup toolchain install nightly --component miri --component rust-src --component rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install quality tools
        run: cargo binstall cargo-llvm-cov cargo-crap similarity-rs cargo-machete --no-confirm

      - name: Check
        run: make check

      - name: Run tests
        run: make test-all

      - name: Lint
        run: make lint

      - name: Code health
        run: make code-health

      - name: Vendor format
        run: make fmt-vendor-check
